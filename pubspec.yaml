name: autoterra
description: B2B платформа для управления спросом через дистрибьюторов, колеровкой и AI-поддержкой автосервисов.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  fl_chart: ^0.67.0
  http: ^1.6.0
  flutter_svg: ^2.2.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon-1024.png
  remove_alpha_ios: true
